name: QA Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install test dependencies
        run: |
          cd tests
          npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start backend
        run: |
          cd backend
          node server.js &
      
      - name: Start frontend
        run: |
          cd frontend
          npm run dev &

      - name: Wait for servers
        run: sleep 10

      - name: Run API tests
        run: |
          cd tests
          npm test

      - name: Run UI tests
        run: |
          cd tests
          npx playwright test ui